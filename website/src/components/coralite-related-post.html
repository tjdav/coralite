<template id="coralite-related-post">
  <li>
    <a href="{{ pageUrlPathname }}">{{ pageTitle }}</a> - {{ localeDate }}
  </li>
</template>


<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    attributes: {
      title: { type: String }
    },
    async data (context) {
      const state = context.state
      const meta = state.page.meta

      let formattedDate = 'N/A'
      if (meta.published_time) {
        try {
          formattedDate = new Date(meta.published_time).toLocaleDateString('en-AU', {
            year: '2-digit',
            month: 'short',
            day: 'numeric'
          })
        } catch (e) {
          console.error('Failed to format date:', e)
        }
      }

      return {
        pageTitle: meta.pageTitle || 'Untitled Post',
        pageUrlPathname: state.page.url.pathname,
        localeDate: formattedDate
      }
    }
  })
</script>
