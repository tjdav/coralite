<template id="coralite-related-posts">
  <h3>Related posts</h3>
  {{ posts }}
  <p><a href="/blog">More blog posts</a></p>
</template>

<script type="module">
  import { defineComponent } from 'coralite'
  import { aggregate } from 'aggregation'

  export default defineComponent({
    async data (context) {
      const postItems = await aggregate('related-posts', context)

      if (postItems) {
        return {
          posts: `<ul>${postItems}</ul>`
        }
      }

      return {
        posts: null
      }
    }
  })
</script>
