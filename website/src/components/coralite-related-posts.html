<template id="coralite-related-posts">
  <h3>Related posts</h3>
  {{ posts }}
  <p><a href="/blog">More blog posts</a></p>
</template>

<script type="module">
  import { defineComponent } from 'coralite'
  import { aggregate } from 'aggregation'

  export default defineComponent({
    async data (context) {
      const postItems = await aggregate({
        path: ['blog'],
        component: 'coralite-related-post',
        limit: 3,
        filter (state) {
          return state.page.url.pathname !== context.page.url.pathname
        },
        sort (a, b) {
          let dateA = 0
          let dateB = 0

          if (a) {
            dateA = a.page.meta.published_time
          }

          if (b) {
            dateB = b.page.meta.published_time
          }

          return new Date(dateB) - new Date(dateA)
        }
      })

      if (postItems.length) {
        const ul = {
          type: 'tag',
          name: 'ul',
          children: postItems
        }

        for (let i = 0; i < postItems.length; i++) {
          const item = postItems[i]
          item.parent = ul
        }

        return {
          posts: ul
        }
      }

      return {
        posts: null
      }
    }
  })
</script>
