<template id="coralite-author">
  <div class="post-author">
    <a href="{{ url }}" target="_blank">
      {{ img }}
      <span>{{ fullName }}</span> -
    </a>
    <time datetime="{{ date-time }}"> {{ localeDate }}</time>
  </div>
</template>

<script type="module">
import { defineComponent } from 'coralite'

const authors = {
  thomas: {
    url: 'https://thomasjackdavid.com',
    img: {
      avif: '/images/thomas-avatar.avif',
      webp: '/images/thomas-avatar.webp',
      default: '/images/thomas-avatar.png'
    },
    name: 'Thomas David'
  }
}

export default defineComponent({
  properties (context) {
    const authorKey = context.properties.name || 'thomas'
    const currentAuthor = authors[authorKey]

    if (!currentAuthor) {
      return {
        url: '',
        img: '<picture><img class="post-author-img" src="/images/default.png" alt="Unknown Author"></picture>',
        fullName: 'Unknown',
        localeDate: ''
      }
    }

    const url = currentAuthor.url || ''

    let pictureHtml = '<picture>'
    if (currentAuthor.img.avif) {
      pictureHtml += `<source srcset="${currentAuthor.img.avif}" type="image/avif">`
    }

    // Removed redundant avif check from original code
    if (!currentAuthor.img.default) {
      throw new Error('Author image expects a default image')
    }

    pictureHtml += `<img class="post-author-img" src="${currentAuthor.img.default}" alt="Photo of ${currentAuthor.name}">`
    pictureHtml += '</picture>'

    const fullName = currentAuthor.name || ''

    let localeDate = ''
    if (context.properties.dateTime) {
      try {
        localeDate = new Date(context.properties.dateTime).toLocaleDateString('en-AU', {
          year: '2-digit',
          month: 'short',
          day: 'numeric'
        })
      } catch (e) {
        console.error('Failed to parse date:', e)
      }
    }

    return {
      url,
      img: pictureHtml,
      fullName,
      localeDate
    }
  }
})
</script>
