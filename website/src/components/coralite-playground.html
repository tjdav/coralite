<script type="module">
  import { defineComponent } from 'coralite'
  import { parseHTML } from 'coralite/utils'
  import code from 'highlight.js'
  import { dedent } from '../utils/format.js'

  code.configure({
    classPrefix: 'code-'
  })

  const highlight = (str, lang) => {
    const highlighted = code.highlight(dedent(str).trim(), { language: lang }).value
    return parseHTML(highlighted).root.children
  }

  export default defineComponent({
    server: async () => {
      return {
        tab1_file1: highlight(`
          <!DOCTYPE html>
          <html>
          <head>
            <title>Coralite Basics</title>
          </head>
          <body>
            <h1>Welcome to Coralite</h1>
            <hello-world name="Developer"></hello-world>
          </body>
          </html>
        `, 'html'),
        tab1_file2: highlight(`
          <template id="hello-world">
            <div class="greeting">
              <h2>Hello, {{ name }}!</h2>
              <p>Welcome to your first Coralite component.</p>
            </div>
          </template>

          <style>
            .greeting { border: 1px solid #eee; padding: 1rem; }
          </style>

          <script type="module">
            // No vanilla class extensions; use the framework's defineComponent helper
            import { defineComponent } from 'coralite';

            export default defineComponent({
              // Coerces HTML attributes into typed JavaScript primitives
              attributes: {
                name: String
              }
            });
          <\/script>
        `, 'html'),
        tab2_file1: highlight(`
          <main>
            <h2>Interactive Counter</h2>
            <click-counter step="2"></click-counter>
          </main>
        `, 'html'),
        tab2_file2: highlight(`
          <template id="click-counter">
            <div class="counter-box">
              <p>Current Count: {{ count }}</p>
              <button ref="incrementBtn">Increment by {{ step }}</button>
            </div>
          </template>

          <script type="module">
            import { defineComponent } from 'coralite';

            export default defineComponent({
              attributes: {
                step: Number
              },
              // The client block is your browser-side controller
              client: ({ state, refs }) => {
                // Initialize state
                state.count = 0;

                // Access elements via the refs dictionary and attach listeners
                refs('incrementBtn').addEventListener('click', () => {
                  // Mutations automatically trigger precise DOM updates
                  state.count += state.step;
                });
              }
            });
          <\/script>
        `, 'html'),
        tab3_file1: highlight(`
          <main>
            <user-profile user-id="42"></user-profile>
          </main>
        `, 'html'),
        tab3_file2: highlight(`
          <template id="user-profile">
            <article>
              <h2>{{ username }}</h2>
              <p>{{ bio }}</p>
            </article>
          </template>

          <script type="module">
            import { defineComponent } from 'coralite';

            export default defineComponent({
              attributes: {
                userId: Number
              },
              // Runs purely on the server. Stripped from the client bundle.
              server: async ({ state }) => {
                const response = await fetch(\`https://api.example.com/users/\${state.userId}\`);
                const data = await response.json();
                
                // Returned object is serialized and merged into the client's unified state
                return {
                  username: data.name,
                  bio: data.bio
                };
              }
            });
          <\/script>
        `, 'html'),
        tab4_file1: highlight(`
          <main>
            <h2>Application Dashboard</h2>
            <dashboard-view></dashboard-view>
          </main>
        `, 'html'),
        tab4_file2: highlight(`
          <template id="dashboard-view">
            <div class="dashboard">
              <p>Welcome to your SPA dashboard.</p>
              <button ref="actionBtn">Trigger Action</button>
            </div>
          </template>

          <script type="module">
            import { defineComponent } from 'coralite';

            export default defineComponent({
              client: ({ refs }) => {
                refs('actionBtn').addEventListener('click', () => {
                  // Dynamically load components using standard native APIs
                  // Warning: Never use element.innerHTML = '<toast-message>'
                  const toast = document.createElement('toast-message');
                  
                  toast.setAttribute('message', 'Action completed successfully!');
                  document.body.appendChild(toast);
                });
              }
            });
          <\/script>
        `, 'html'),
        tab4_file3: highlight(`
          <template id="toast-message">
            <div class="toast">
              <span>{{ message }}</span>
              <button ref="closeBtn">Dismiss</button>
            </div>
          </template>

          <script type="module">
            import { defineComponent } from 'coralite';

            export default defineComponent({
              attributes: {
                message: String
              },
              client: ({ signal, refs }) => {
                // The signal automatically cleans up listeners when the component unmounts
                refs('closeBtn').addEventListener('click', function(e) {
                  const hostElement = e.target.closest('toast-message');
                  hostElement.remove();
                }, { signal });
              }
            });
          <\/script>
        `, 'html'),
        tab5_file1: highlight(`
          import { definePlugin } from 'coralite';

          export default definePlugin({
            name: 'store',
            
            client: {
              // The Two-Phase Resolver
              context: (pluginContext) => {
                // PHASE 1: Global Setup
                // Runs exactly once when the plugin registers. 
                // Use this for shared plugin state/singletons across the browser.
                const globalCache = new Map();
                let cartCount = 0;

                return (instanceContext) => {
                  // PHASE 2: Local Instance
                  // Runs when a specific component mounts.
                  // Returns the actual utility mapped to the plugin's namespace.
                  return {
                    getCartCount: () => cartCount,
                    addToCart: (item) => {
                      cartCount++;
                      globalCache.set(item.id, item);
                      console.log(\`Component [\${instanceContext.instanceId}] updated the global store.\`);
                    }
                  };
                };
              }
            }
          });
        `, 'javascript'),
        tab5_file2: highlight(`
          <template id="cart-button">
            <div class="cart-controls">
              <button ref="addBtn">Add to Cart</button>
              <span ref="status"></span>
            </div>
          </template>

          <script type="module">
            import { defineComponent } from 'coralite';

            export default defineComponent({
              attributes: {
                itemId: String,
                itemName: String
              },
              // The plugin is namespaced on the client context object 
              // using the plugin's 'name' property
              client: ({ store, state, refs }) => {
                refs('addBtn').addEventListener('click', () => {
                  // Access Phase 2 methods interacting with Phase 1 shared state
                  store.addToCart({ 
                    id: state.itemId, 
                    name: state.itemName 
                  });
                  
                  refs('status').textContent = \`Total Items: \${store.getCartCount()}\`;
                });
              }
            });
          <\/script>
        `, 'html')
      }
    }
  })
</script>
