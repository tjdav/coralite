when:
  - event: [push, pull_request]
    branch: main
    path:
      exclude:
        - '**.md'
        - 'docs/**'
        - 'website/**'

steps:
  check:
    image: guergeiro/pnpm:lts-latest-slim
    commands:
      - pnpm install --frozen-lockfile
      - pnpm lint
      - pnpm --filter coralite run test:unit

  smoke:
    image: guergeiro/pnpm:lts-latest-slim
    depends_on:
      - check
    commands:
      - node scripts/smoke.js coralite
      - node scripts/smoke.js create-coralite
      - node scripts/smoke.js coralite-scripts