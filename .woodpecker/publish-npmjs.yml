when:
  - event: tag
    tag: "*-v*"

steps:
  publish_to_npm:
    image: guergeiro/pnpm:lts-latest-slim
    secrets: [ npm_token ]
    commands:
      # Extract Package Name & Path using Woodpecker's built-in tag variable
      - export PACKAGE_NAME=$(echo $CI_COMMIT_TAG | sed -E 's/-v[0-9]+\.[0-9]+\.[0-9]+.*//')
      - echo "Extracted PACKAGE_NAME=$PACKAGE_NAME"
      
      - export PACKAGE_PATH=$(pnpm list --filter "$PACKAGE_NAME" --depth -1 --json | node -e "const input = JSON.parse(require('fs').readFileSync(0)); console.log(input[0]?.path || '');")
      - echo "Extracted PACKAGE_PATH=$PACKAGE_PATH"

      # Install Dependencies & Build
      - pnpm install --frozen-lockfile
      - pnpm --filter "$PACKAGE_NAME..." run --if-present build

      # Authenticate with NPM (Woodpecker natively maps the secret to an environment variable)
      - pnpm config set //registry.npmjs.org/:_authToken=$NPM_TOKEN

      # Check Privacy and Publish
      - export IS_PRIVATE=$(node -p "require('$PACKAGE_PATH/package.json').private || false")
      - |
        if [ "$IS_PRIVATE" = "true" ]; then
          echo "Skipping publish for $PACKAGE_NAME (Private package)."
        else
          echo "🚀 Publishing $PACKAGE_NAME to npmjs.com..."
          pnpm --filter "$PACKAGE_NAME" publish \
            --registry "https://registry.npmjs.org/" \
            --no-git-checks
        fi