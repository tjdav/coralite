<template id="coralite-counter">
  <button ref="count-button" type="button" class="btn">
    Count is {{ count }}
  </button>
</template>

<style>
  .btn {
    background-color: var(--primary);
    color: var(--body-bg);
    border: none;
    border-radius: var(--border-radius);
    padding: var(--padding-y) var(--padding-x);
    font-family: var(--font-body);
    font-size: var(--spacer-base);
    cursor: pointer;
    box-shadow: var(--box-shadow);
    transition: background-color 0.2s ease-in-out;
  }

  .btn:hover {
    background-color: var(--code-colour);
  }
</style>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    attributes: {
      step: {
        type: Number,
        default: 1
      }
    },

    async data () {
      return {
        count: 0
      }
    },

    client ({ state, signal, refs }) {
      const button = refs('count-button')

      button.addEventListener('click', async () => {
        const { default: confetti } = await import('https://esm.sh/canvas-confetti@latest')

        // Coralite automatically patches the {{ count }} token in the template.
        state.count += state.step

        // Explode confetti :)
        confetti()
      }, { signal })
    }
  })
</script>
