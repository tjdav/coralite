<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Standalone Component Tests</title>
</head>

<body>
  <h1>Testing Standalone Components</h1>

  <!-- Use wrapper to test component client imports -->
  <div id="standalone-wrapper"></div>
  <p id="result-text"></p>

  <!-- Do not import my-button.js directly, let standalone-wrapper import it -->
  <script type="module" src="./standalone/standalone-wrapper.js"></script>
  <script>
    document.getElementById('standalone-wrapper').innerHTML = '<standalone-wrapper></standalone-wrapper>'
    window.addEventListener('button-clicked', (e) => {
      const p = document.getElementById('result-text')
      if (p) {
        p.textContent = 'Button was clicked from component event!'
      }
    })
  </script>
</body>

</html>
