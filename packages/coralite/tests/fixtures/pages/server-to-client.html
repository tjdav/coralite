<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Server to Client Test</title>
</head>
<body>
  <h1>SSR Instance</h1>
  <server-to-client-comp attr-val="initial"></server-to-client-comp>

  <h1>Imperative Instance</h1>
  <div id="imperative-container"></div>

  <script type="module">
    Promise.resolve(window.__coralite_ready__)
      .then(() => {
        const container = document.getElementById('imperative-container')
        const el = document.createElement('server-to-client-comp')
        container.appendChild(el)
      })
  </script>
</body>
</html>
