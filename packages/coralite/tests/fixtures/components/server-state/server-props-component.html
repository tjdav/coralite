<template id="server-props-component">
  <div>
    <h2 ref="title" test="title">{{ title }}</h2>
    <p ref="filePath" test="filePath">{{ filePath }}</p>
    <p ref="serverData" test="serverData">{{ serverData }}</p>
    <p ref="metaLang" test="metaLang">{{ metaLang }}</p>
  </div>
</template>

<script type="module">
  import { defineComponent } from 'coralite'
  import fs from 'node:fs'

  export default defineComponent({
    async server (context) {
      const stats = fs.statSync('package.json')
  
      return {
        title: 'Server Properties Title',
        filePath: context.page.file.pathname,
        serverData: stats.isFile() ? 'FileExists' : 'NotFound',
        metaLang: context.page.meta.lang || 'none'
      }
    }
  })
</script>
