<template id="nested-parent">
  <div class="host" ref="host" data-testid="host"></div>
</template>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    client ({ refs }) {
      const host = refs('host')
      const layout = document.createElement('nested-layout')
      const button = document.createElement('nested-button')
      button.setAttribute('label', 'Click Me')
      layout.appendChild(button)
      host.appendChild(layout)
    }
  })
</script>
