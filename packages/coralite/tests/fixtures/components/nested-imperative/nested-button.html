<template id="nested-button">
  <button ref="btn">{{ label }}</button>
</template>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    attributes: {
      label: {
        type: String,
        default: 'Click me'
      }
    },
    client ({ state, refs }) {
      refs('btn').addEventListener('click', () => {
        state.label = 'Clicked'
      })
    }
  })
</script>
