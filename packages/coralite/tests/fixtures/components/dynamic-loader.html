<template id="dynamic-loader">
  <div id="loader-target" ref="container"></div>
</template>

<script type="module">
  import { defineComponent } from 'coralite/plugins'

  export default defineComponent({
    client: {
      components: ['dynamic-child'],
      script: ({ helpers }) => {
        // Appends after a small delay to simulate dynamic insertion
        setTimeout(() => {
          const container = helpers.refs('container')
          const childComponent = document.createElement('dynamic-child')
          container.replaceWith(childComponent)
        }, 100)
      }
    }
  })
</script>
