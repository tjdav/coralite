<template id="server-to-client-comp">
  <div data-testid="server-val">{{ serverVal }}</div>
  <div data-testid="getter-val">{{ getterVal }}</div>
  <div data-testid="attr-val">{{ attrVal }}</div>
  <button id="check-state">Check State</button>
  <div data-testid="client-state"></div>
</template>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    attributes: {
      attrVal: {
        type: String,
        default: 'default'
      }
    },
    async server () {
      return {
        serverVal: 'from-server',
        attrVal: 'overwritten-by-server',
        unusedVal: 'not-in-client-code'
      }
    },
    getters: {
      getterVal: (state) => `getter-${state.serverVal}`
    },
    client (context) {
      const { state, root } = context
      const btn = root.querySelector('#check-state')
      const display = root.querySelector('[data-testid="client-state"]')
  
      btn.addEventListener('click', () => {
        display.textContent = JSON.stringify({
          serverVal: state.serverVal,
          attrVal: state.attrVal,
          getterVal: state.getterVal,
          unusedVal: state.unusedVal
        })
      })
    }
  })
</script>
