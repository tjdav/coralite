<template id="mutation-test-component">
  <div ref="server-result">{{ serverData }}</div>
  <div ref="observer-result">{{ observerData }}</div>
  <div ref="inter-plugin-result">{{ interPluginData }}</div>
  <div ref="client-result">Initial Client State</div>
  <button ref="client-action">Click Me</button>
</template>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    server (context) {
      const { getServerData, getInterPluginData } = context['consumer-server-plugin']
      const { getObservedData } = context['observer-plugin']
  
      return {
        serverData: getServerData(),
        observerData: getObservedData(),
        interPluginData: getInterPluginData()
      }
    },
    client: (context) => {
      const { refs } = context
      const { getClientUtility } = context['consumer-client-plugin']
      const btn = refs('client-action')
      const resultDiv = refs('client-result')
  
      btn.addEventListener('click', () => {
        // getClientUtility is Phase 3 (returned by Phase 2)
        const result = getClientUtility()
        resultDiv.textContent = result
      })
    }
  })
</script>
