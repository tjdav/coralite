<template id="getter-child">
  <p ref="status" test="status">{{ isSeen }}</p>
</template>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    attributes: {
      seen: Boolean
    },
    getters: {
      isSeen: (state) => (state.seen ? 'Seen' : 'Unseen')
    }
  })
</script>
