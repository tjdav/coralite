<template id="getter-parent">
  <div ref="container"></div>
</template>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    client ({ refs }) {
      const child = document.createElement('getter-child')
      child.setAttribute('seen', 'true')
      refs('container').appendChild(child)
    }
  })
</script>
