<template id="innerhtml-parent">
  <div ref="container"></div>
  <div ref="outerContainer"></div>
  <div ref="adjacentContainer"></div>
</template>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    client: async ({ refs }) => {
      const container = refs('container')
      container.innerHTML = '<innerhtml-child title="InnerHTML Mount"></innerhtml-child>'

      const outerContainer = refs('outerContainer')
      const target = document.createElement('div')
      outerContainer.appendChild(target)
      target.outerHTML = '<innerhtml-child title="OuterHTML Mount"></innerhtml-child>'

      const adjacentContainer = refs('adjacentContainer')
      adjacentContainer.insertAdjacentHTML('beforeend', '<innerhtml-child title="AdjacentHTML Mount"></innerhtml-child>')
    }
  })
</script>
