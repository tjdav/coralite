<template id="plugin-component">
  <div data-testid="content">
    <h2 data-testid="title">{{ title }}</h2>
    <plugin-injected-child data-testid="injected"></plugin-injected-child>
    <div data-testid="pluginData"></div>
    <div data-testid="meta-info">Title: {{ pageTitle }}</div>
    <div data-testid="plugin-message">{{ pluginMessage }}</div>
    <div data-testid="hook-message">{{ hookMessage }}</div>
    <div data-testid="hook-result"></div>
  </div>
</template>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    async server (context) {
      const test = context['test-context-plugin']
      return {
        title: 'Plugin Component',
        pageTitle: context.page.meta.title,
        pluginMessage: test ? test.getPluginMessage('E2E Test') : 'no-plugin',
        hookMessage: 'default'
      }
    },
    client ({ refs, 'test-context-plugin': testPlugin, 'mock-plugin': mockPlugin }) {
      if (testPlugin) {
        testPlugin.testHelper(refs('pluginData'))
      }
      if (mockPlugin) {
        mockPlugin.renderPluginChild(refs('injected'))
      }
    }
  })
</script>
