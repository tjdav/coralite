<template id="primitive-coercion">

    <p data-testid="count">{{ count }}</p>
    <p data-testid="active">{{ active }}</p>
    <p data-testid="count-type">{{ countType }}</p>
    <p data-testid="active-type">{{ activeType }}</p>
  </div>
</template>

<script type="module">
  import { defineComponent } from 'coralite/plugins'

  export default defineComponent({
    attributes: {
      count: {
        type: Number,
        default: 0
      },
      active: {
        type: Boolean,
        default: false
      }
    },
    getters: {
      countType: (state) => typeof state.count,
      activeType: (state) => typeof state.active
    }
  })
