<template id="primitive-coercion">
  <div>
    <p ref="count" test="count">{{ count }}</p>
    <p ref="active" test="active">{{ active }}</p>
    <p ref="count-type" test="count-type">{{ countType }}</p>
    <p ref="active-type" test="active-type">{{ activeType }}</p>
  </div>
</template>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    attributes: {
      count: {
        type: Number,
        default: 0
      },
      active: {
        type: Boolean,
        default: false
      }
    },
    getters: {
      countType: (state) => typeof state.count,
      activeType: (state) => typeof state.active
    }
  })
</script>
