<template id="priority-parent">
  <div ref="container" data-testid="container"></div>
</template>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    client: async ({ refs }) => {
      const container = refs('container')
  
      const dp = document.createElement('dual-proxy')
      dp.setAttribute('count', '5')
      container.appendChild(dp)

      const ar = document.createElement('async-race')
      container.appendChild(ar)
    }
  })
</script>
