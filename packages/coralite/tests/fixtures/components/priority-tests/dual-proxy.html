<template id="dual-proxy">
  <div>
    <p ref="doubled" test="doubled">{{ doubled }}</p>
    <button ref="increment" test="increment">Increment</button>
  </div>
</template>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    attributes: {
      count: {
        type: Number,
        default: 0
      }
    },
    getters: {
      doubled: (state) => {
        // This mutation should fail or be ignored/warned if ReadOnlyProxy is enforced
        try {
          state.count = 999
        } catch {
          return 'MutationBlocked'
        }
        return state.count * 2
      }
    },
    client: (context) => {
      const { state, signal, refs } = context
      refs('increment').addEventListener('click', () => {
        state.count++
      }, { signal })
    }
  })
</script>
