<template id="boolean-attr-component">
  <div>
    <input type="checkbox" data-testid="checkbox" checked="{{ isChecked }}">
    <button data-testid="btn" disabled="{{ isDisabled }}">Click</button>
    <button data-testid="toggle-btn">Toggle</button>
  </div>
</template>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    attributes: {
      isChecked: {
        type: Boolean,
        default: false
      },
      isDisabled: {
        type: Boolean,
        default: false
      }
    },
    client ({ state, refs }) {
      refs('toggle-btn').addEventListener('click', () => {
        state.isChecked = !state.isChecked
      })
    }
  })
</script>
