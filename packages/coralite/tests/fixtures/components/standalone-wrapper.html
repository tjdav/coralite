<template id="standalone-wrapper">
  <div>
    <h2>Wrapper Component</h2>

    <!-- Test skip render -->
    <my-button text="Click Me!" data-skip-render="true"></my-button>

    <!-- Test multiple instances -->
    <my-button text="Click Me!"></my-button>

    <!-- Test Slot -->
    <my-button text="Slotted">
      <span class="custom-icon">🚀</span>
    </my-button>

    <div ref="dynamicContainer" id="dynamic-container" style="display:none"></div>

    <button class="my-btn">Leak Test</button>
  </div>
</template>

<style>
  .my-btn {
    /* If styles leak, this button will turn blue. If scoped properly, it remains default */
  }
</style>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    client: {
      imports: [
        {
          specifier: './my-button.js'
        }
      ],
      script: function (context) {
        const dynamicContainer = context.helpers.refs('dynamicContainer')
        if (dynamicContainer) {
          dynamicContainer.style.display = 'block'
          dynamicContainer.innerHTML = '<my-button text="Dynamic Button"></my-button>'
        }
      }
    }
  })
</script>
