<template id="shorthand-method-test">
  <div>
    <span ref="message">{{ generatedMessage }}</span>
  </div>
</template>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    properties: (context) => {
      const msg = context.properties.msg
      return {
        initialMessage: 'Hello',
        myShorthand: msg + '!',
        generatedMessage: 'Hello world!'
      }
    },
    script (context) {
      const msg = context.properties.myShorthand({ msg: 'Hello from client' })
      const refId = context.properties.ref_message
      const el = document.querySelector(`[ref="${refId}"]`)
      if (el) {
        el.textContent = msg
      }
    }
  })
</script>
