
<template id="current-language">
  <p class="current-language">{{ pageLang }} - {{ displayName }}</p>
</template>

<script type="module">
import { defineComponent } from 'coralite'

export default defineComponent({
  properties: (context) => {
    const page = context.page
    const page_lang = page.meta.lang || ''
    const displayNames = new Intl.DisplayNames(['en'], { type: 'language' })
    return {
      pageLang: page_lang,
      displayName: displayNames.of(page_lang)
    }
  }
})
</script>
