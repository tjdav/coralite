
<template id="imperative-tokens-child">
  <div id="test-output">{{ helloWorld }}</div>
  <div id="test-output-step">{{ step }}</div>
</template>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    properties: async (context) => {
      const properties = context.properties
  
      return {
        helloWorld: 'hello world',
        step: parseInt(properties.start || '0') + 1
      }
    }
  })
</script>
