<template id="imperative-tokens-child">
  <div id="test-output">{{ helloWorld }}</div>
  <div id="test-output-step">{{ step }}</div>
</template>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    tokens: {
      helloWorld () {
        return 'hello world'
      },
      step (properties) {
        return parseInt(properties.start || '0') + 1
      }
    }
  })
</script>
