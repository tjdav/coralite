<template id="server-to-client-comp">
  <div ref="server-val" test="server-val">{{ serverVal }}</div>
  <div ref="getter-val" test="getter-val">{{ getterVal }}</div>
  <div ref="attr-val-display" test="attr-val-display">{{ attrVal }}</div>
  <button ref="check-state" test="check-state">Check State</button>
  <div ref="client-state" test="client-state"></div>
</template>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    attributes: {
      attrVal: {
        type: String,
        default: 'default'
      }
    },
    async server () {
      return {
        serverVal: 'from-server',
        attrVal: 'overwritten-by-server',
        unusedVal: 'not-in-client-code'
      }
    },
    getters: {
      getterVal: (state) => `getter-${state.serverVal}`
    },
    client (context) {
      const { state, refs } = context
      const btn = refs('check-state')
      const display = refs('client-state')
  
      btn.addEventListener('click', () => {
        display.textContent = JSON.stringify({
          serverVal: state.serverVal,
          attrVal: state.attrVal,
          getterVal: state.getterVal,
          unusedVal: state.unusedVal
        })
      })

      // Update the display for E2E
      state.attrVal = state.attrVal
    }
  })
</script>
