<template id="server-to-client-parent">
  <div ref="container"></div>
</template>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    client ({ refs }) {
      const container = refs('container')
      const child = document.createElement('server-to-client-comp')
      child.setAttribute('attr-val', 'initial')
      container.appendChild(child)
    }
  })
</script>
