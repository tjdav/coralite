<template id="on-demand-parent">
  <div ref="container" data-testid="container"></div>
  <button ref="loadA" data-testid="loadA">Load A</button>
  <button ref="loadB" data-testid="loadB">Load B</button>
</template>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    client ({ refs }) {
      refs('loadA').addEventListener('click', () => {
        const a = document.createElement('on-demand-a')
        refs('container').appendChild(a)
      })
      refs('loadB').addEventListener('click', () => {
        const b = document.createElement('on-demand-b')
        refs('container').appendChild(b)
      })
    }
  })
</script>
