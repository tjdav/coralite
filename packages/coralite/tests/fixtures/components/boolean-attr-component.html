<template id="boolean-attr-component">
  <input type="checkbox" data-testid="checkbox" checked="{{ isChecked }}" disabled="{{ isDisabled }}">
  <button ref="toggle-btn">Toggle</button>
  <div ref="status">{{ isChecked }}</div>
</template>

<script type="module">
import { defineComponent } from 'coralite'

export default defineComponent({
  attributes: {
    isChecked: {
      type: Boolean,
      default: false
    },
    isDisabled: {
      type: Boolean,
      default: false
    }
  },
  script ({ state, refs }) {
    const btn = refs('toggle-btn')

    btn.addEventListener('click', () => {
      state.isChecked = !state.isChecked
    })
  }
})
</script>
