<template id="client-script-component">
  <div class="client-script-root">
    <h2 class="title-display" data-testid="titleDisplay">{{ title }}</h2>
    <p class="status-display" data-testid="statusDisplay">Status: {{ status }}</p>
    <button class="update-btn" ref="updateBtn" data-testid="updateBtn">Update Status</button>
    <div class="container" ref="container" data-testid="container"></div>
    <div class="dynamic-display" data-testid="dynamic-display">{{ dynamicValue }}</div>
  </div>
</template>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    attributes: {
      title: {
        type: String,
        default: 'Default Title'
      }
    },
    async server () {
      return {
        status: 'Offline',
        dynamicValue: 'Loading...'
      }
    },
    async client ({ state, refs, 'test-context-plugin': testPlugin }) {
      const btn = refs('updateBtn')
      const container = refs('container')

      btn.addEventListener('click', () => {
        state.title = 'Updated'
        state.status = 'Online'
      })

      if (testPlugin) {
        container.setAttribute('data-confetti', 'loaded')
      }
  
      const mod = await import('../../dummy-client-lib.js')
      state.dynamicValue = mod.foo
    }
  })
</script>
