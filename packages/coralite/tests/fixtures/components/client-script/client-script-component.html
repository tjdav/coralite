<template id="client-script-component">
  <div>
    <h2 ref="titleDisplay" test="titleDisplay">{{ title }}</h2>
    <p ref="statusDisplay" test="statusDisplay">Status: {{ status }}</p>
    <button ref="updateBtn" test="updateBtn">Update Status</button>
    <div ref="container" test="container"></div>
    <div ref="dynamic-display" test="dynamic-display">{{ dynamicValue }}</div>
  </div>
</template>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    attributes: {
      title: {
        type: String,
        default: 'Default Title'
      }
    },
    async server () {
      return {
        status: 'Offline',
        dynamicValue: 'Loading...'
      }
    },
    async client ({ state, refs, 'test-context-plugin': testPlugin }) {
      const btn = refs('updateBtn')
      const container = refs('container')

      btn.addEventListener('click', () => {
        state.title = 'Updated'
        state.status = 'Online'
      })

      if (testPlugin) {
        container.setAttribute('data-confetti', 'loaded')
      }
  
      const mod = await import('../../dummy-client-lib.js')
      state.dynamicValue = mod.foo
    }
  })
</script>
