<template id="client-script-component">
  <div ref="container">
    <h2 ref="titleDisplay">{{ title }}</h2>
    <p ref="statusDisplay">Status: {{ status }}</p>
    <button ref="updateBtn">Update</button>
  </div>
</template>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    attributes: {
      title: {
        type: String,
        default: 'Initial'
      },
      status: {
        type: String,
        default: 'Offline'
      }
    },
    script: (context) => {
      const { state, signal } = context
      const { refs } = context.refs
      const updateBtn = refs('updateBtn')

      updateBtn.addEventListener('click', async () => {
        // test reactivity by updating state
        state.title = 'Updated'
        state.status = 'Online'

        // test dynamic imports
        const { default: confetti } = await import('https://esm.sh/canvas-confetti@1.6.0')
        if (confetti) {
          const container = refs('container')

          container.setAttribute('data-confetti', 'loaded')
        }
      }, { signal })
    }
  })
</script>
