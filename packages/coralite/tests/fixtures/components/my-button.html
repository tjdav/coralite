<template id="my-button">
  <button ref="btn" class="my-btn">{{ text }}</button>
</template>

<style>
  .my-btn {
    background-color: #007bff;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
  }
  .my-btn:hover {
    background-color: #0056b3;
  }
</style>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    client: {
      script: function(context) {
        const btn = context.helpers.refs('btn');
        
        btn.addEventListener('click', () => {
          this.dispatchEvent(new CustomEvent('button-clicked', { 
            detail: { 
              id: btn.id
            },
            bubbles: true 
          }));
        });
      }
    }
  })
</script>
