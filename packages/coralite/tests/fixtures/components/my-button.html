<template id="my-button">
  <div class="container">
    <button ref="btn" class="my-btn">
      {{ text }}
      <slot></slot>
    </button>
    <div ref="output" class="output">{{ asyncData }}</div>
    <div ref="jsonOutput" class="json-output"></div>
  </div>
</template>

<style>
  .container {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .my-btn {
    background-color: #007bff;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
  }
  .my-btn:hover {
    background-color: #0056b3;
  }
  .output {
    font-family: monospace;
    font-size: 14px;
  }
</style>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    tokens: {
      asyncData () {
        return 'Waiting for button to be clicked.'
      }
    },
    client: {
      imports: [
        {
          specifier: 'https://esm.sh/canvas-confetti@1.6.0',
          defaultExport: 'confetti'
        },
        {
          specifier: './tests/fixtures/dummy-data.json',
          defaultExport: 'dummyData',
          attributes: { type: 'json' }
        }
      ],
      setup: async function () {
        return new Promise(resolve => {
          setTimeout(() => {
            resolve({ asyncData: 'Loaded from setup!' })
          }, 50)
        })
      },
      script: function (context) {
        const btn = context.helpers.refs('btn')
        const output = context.helpers.refs('output')
        const jsonOutput = context.helpers.refs('jsonOutput')
  
        if (context.imports.dummyData) {
          jsonOutput.textContent = context.imports.dummyData.name
        }

        btn.addEventListener('click', function () {
          context.imports.confetti({
            particleCount: 100,
            spread: 70,
            origin: { y: 0.6 }
          })
          output.textContent = 'Confetti fired!'
  
          this.dispatchEvent(new CustomEvent('button-clicked', {
            detail: {
              id: btn.id
            },
            composed: true,
            bubbles: true
          }))
        })
      }
    }
  })
</script>
