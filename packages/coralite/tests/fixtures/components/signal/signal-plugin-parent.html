<template id="signal-plugin-parent">
  <div>
    <button ref="sp-mountBtn">Mount</button>
    <button ref="sp-unmountBtn">Unmount</button>
    <div ref="sp-container"></div>
  </div>
</template>
<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    client: {
      components: ['signal-plugin-child'],
      script: ({ helpers }) => {
        const mountBtn = helpers.refs('sp-mountBtn')
        const unmountBtn = helpers.refs('sp-unmountBtn')
        const container = helpers.refs('sp-container')

        mountBtn.addEventListener('click', () => {
          if (!container.querySelector('signal-plugin-child')) {
            const child = document.createElement('signal-plugin-child')
            container.appendChild(child)
          }
        })

        unmountBtn.addEventListener('click', () => {
          const child = container.querySelector('signal-plugin-child')
          if (child) {
            container.removeChild(child)
          }
        })
      }
    }
  })
</script>
