<template id="computed-slots-imperative">
  <div class="wrapper">
    <slot name="header"></slot>
    <slot></slot>
  </div>
</template>
<script type="module">
import { defineComponent } from 'coralite/plugins'

export default defineComponent({
  slots: {
    header: (content, properties) => {
      return `<h1 class="header-slot">Title: ${properties.title}</h1>`
    },
    default: (content, properties) => {
      // Return modified DOM nodes (e.g. wrapper div for each existing node plus a title)
      // Since `content` in client is an Array of DOM nodes from projected slot.
      // But we can also test string here. Actually, we'll test node modification in header or default.
      if (typeof window !== 'undefined' && Array.isArray(content) && content.length > 0) {
        return content.map(node => {
          if (node.nodeType === 1) {
            const wrapper = document.createElement('div')
            wrapper.className = 'body-slot-node'
            wrapper.textContent = `Body: ${properties.body} - `
            wrapper.appendChild(node)
            return wrapper
          }
          return node
        })
      }
      return `<div class="body-slot">Body: ${properties.body}</div>`
    }
  },
  client: {
    components: ['computed-slots-imperative'],
    script: () => {
    }
  }
})
</script>
