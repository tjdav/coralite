<template id="imperative-child">
  <div>
    <h2 ref="title">{{ title }}</h2>
    <p ref="dataDisplay">{{ dataDisplay }}</p>
  </div>
</template>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    attributes: {
      title: {
        type: String,
        default: 'No Title'
      },
      id: { type: String },
      complexData: { type: String }
    },
    getters: {
      dataDisplay: (state) => state.complexData || (state.id ? `Fetched data for ${state.id}` : 'No Data')
    }
  })
</script>
