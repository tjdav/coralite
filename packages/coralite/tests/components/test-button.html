<template id="test-button">
  <button ref="btn" class="my-btn">{{ text }}</button>
</template>

<style>
  .my-btn {
    background-color: #007bff;
    color: white;
    padding: 10px 20px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
  }
  .my-btn:hover {
    background-color: #0056b3;
  }
</style>

<script type="module">
  import { defineComponent } from 'coralite'

  export default defineComponent({
    client: {
      script: function(context) {
        const btn = context.document.getElementById(context.values.ref_btn);
        
        btn.addEventListener('click', () => {
          // Inside a web component context we can dispatch an event on `this` if we have access to it.
          // In the standalone compilation `this` is correctly bound to the Custom Element instance.
          this.dispatchEvent(new CustomEvent('button-clicked', { bubbles: true }));
        });
      }
    }
  })
</script>
